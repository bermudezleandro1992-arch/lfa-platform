runConfig:
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10

env:
  # Firebase Client (públicas, van con value)
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyA_yFNkLI4bLrmBznnm0xk02z3LCqPoG8I

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: lfaofficial.firebaseapp.com

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: lfaofficial

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: lfaofficial.firebasestorage.app

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "1073871074458"

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:1073871074458:web:d76a568ca85d0055cd5b23

  - variable: IP_API_BASE_URL
    value: https://ipapi.co

  - variable: NEXT_PUBLIC_RECAPTCHA_SITE_KEY
    value: 6LecOcUsAAAAAOOcGzfJtWM3JXpo9xJUVI7_JIjP

  # Bot secret — reemplazar con el valor real en Firebase Console → App Hosting → Secrets
  - variable: BOT_SECRET
    secret: BOT_SECRET

  # Firebase Admin SDK (secretos, van con secret:)
  - variable: FIREBASE_ADMIN_PROJECT_ID
    value: lfaofficial

  - variable: FIREBASE_ADMIN_CLIENT_EMAIL
    value: firebase-adminsdk-fbsvc@lfaofficial.iam.gserviceaccount.com

  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY

  # Google Vision API (secreto)
  - variable: GOOGLE_VISION_API_KEY
    secret: GOOGLE_VISION_API_KEY

  # ── Binance API (retiros automáticos) ──────────────────────────────────────
  # Crear en: https://www.binance.com/en/my/settings/api-management
  # Permisos necesarios: "Enable Withdrawals" + "IP whitelist" con la IP del server
  # Agregar los secrets en Firebase Console → App Hosting → Secrets
  - variable: BINANCE_API_KEY
    secret: BINANCE_API_KEY

  - variable: BINANCE_API_SECRET
    secret: BINANCE_API_SECRET

  # Proxy con IP estática para cumplir whitelist de Binance (usefixie.com)
  - variable: FIXIE_URL
    secret: FIXIE_URL

  # ── Wallet fría de la tesorería LFA (ingresos del 10%) ─────────────────────
  # Crear una wallet Binance SEPARADA solo para acumular el fee organizacional
  # Agregar en Firebase Console → Secret Manager
  - variable: LFA_TREASURY_WALLET
    secret: LFA_TREASURY_WALLET

  - variable: LFA_TREASURY_NETWORK
    secret: LFA_TREASURY_NETWORK
