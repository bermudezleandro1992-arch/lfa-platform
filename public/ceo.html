// 🛡️ BLOQUEO DE TECLAS HACKER Y PANTALLA
// ==========================================
document.onkeydown = function(e) {
    if(e.keyCode == 123) {
        return false;
    }
    if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) {
        return false;
    }
    if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) {
        return false;
    }
    if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) {
        return false;
    }
    if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) {
        return false;
    }
}

window.addEventListener("blur", () => { 
    document.getElementById("antiScreenshot").style.display = "flex"; 
    document.getElementById("lfa-secure-vault").style.display = "none"; 
});

window.addEventListener("focus", () => { 
    document.getElementById("antiScreenshot").style.display = "none"; 
    document.getElementById("lfa-secure-vault").style.display = "block"; 
});

function mostrarAlerta(titulo, mensaje, tipo = 'info') {
    document.getElementById('lfaModalTitle').innerText = titulo;
    document.getElementById('lfaModalText').innerHTML = mensaje;
    document.getElementById('lfaModalBtnCancel').style.display = 'none';
    document.getElementById('lfaModalBtnOk').innerText = 'ACEPTAR';
    
    const icon = document.getElementById('lfaModalIcon'); 
    const box = document.getElementById('lfaModalBox'); 
    const btnOk = document.getElementById('lfaModalBtnOk');
    
    if (tipo === 'error') { 
        icon.className = "lfa-modal-icon fas fa-times-circle"; 
        icon.style.color = "var(--danger)"; 
        box.style.borderColor = "var(--danger)"; 
        btnOk.style.background = "var(--danger)";
        btnOk.style.color = "white";
    } else if (tipo === 'exito') { 
        icon.className = "lfa-modal-icon fas fa-check-circle"; 
        icon.style.color = "var(--primary-neon)"; 
        box.style.borderColor = "var(--primary-neon)"; 
        btnOk.style.background = "var(--primary-neon)";
        btnOk.style.color = "black";
    } else { 
        icon.className = "lfa-modal-icon fas fa-exclamation-circle"; 
        icon.style.color = "var(--warning)"; 
        box.style.borderColor = "var(--warning)"; 
        btnOk.style.background = "var(--warning)";
        btnOk.style.color = "black";
    }
    
    document.getElementById('lfaModal').style.display = 'flex';
    
    return new Promise((resolve) => { 
        document.getElementById('lfaModalBtnOk').onclick = () => { 
            document.getElementById('lfaModal').style.display = 'none'; 
            resolve(true); 
        }; 
    });
}

function mostrarConfirm(titulo, mensaje) {
    document.getElementById('lfaModalTitle').innerText = titulo;
    document.getElementById('lfaModalText').innerHTML = mensaje;
    document.getElementById('lfaModalBtnCancel').style.display = 'inline-block';
    document.getElementById('lfaModalBtnOk').innerText = 'CONFIRMAR';
    
    const icon = document.getElementById('lfaModalIcon'); 
    const box = document.getElementById('lfaModalBox'); 
    const btnOk = document.getElementById('lfaModalBtnOk');
    
    icon.className = "lfa-modal-icon fas fa-question-circle"; 
    icon.style.color = "var(--warning)"; 
    box.style.borderColor = "var(--warning)";
    btnOk.style.background = "var(--warning)";
    btnOk.style.color = "black";
    
    document.getElementById('lfaModal').style.display = 'flex';
    
    return new Promise((resolve) => {
        document.getElementById('lfaModalBtnOk').onclick = () => { 
            document.getElementById('lfaModal').style.display = 'none'; 
            resolve(true); 
        };
        document.getElementById('lfaModalBtnCancel').onclick = () => { 
            document.getElementById('lfaModal').style.display = 'none'; 
            resolve(false); 
        };
    });
}

function cargarStatsFinancieras() { 
    db.collection("usuarios").onSnapshot(snap => { 
        document.getElementById('admRegistrados').innerText = snap.size; 
        
        let totalCoins = 0; 
        
        snap.forEach(doc => { 
            let valor = doc.data().number;
            if (valor) {
                totalCoins += valor; 
            }
        }); 
        
        document.getElementById('admCoinsCirculantes').innerText = `🪙 ${totalCoins.toFixed(2)}`; 
    }); 
    
    db.collection("torneos").where("estado", "in", ["finalizado_premios", "finalizado"]).onSnapshot(snap => {
        let totalGanancias = 0; 
        
        snap.forEach(doc => { 
            const t = doc.data(); 
            let costo = t.costo_inscripcion || 0;
            let cupos = t.cupos_totales || 4;
            
            // LFA SE QUEDA EL 15% DE CADA POZO
            totalGanancias += (costo * cupos * 0.15); 
        }); 
        
        document.getElementById('admGananciasLFA').innerText = `🪙 ${totalGanancias.toFixed(2)}`; 
    });
    
    db.collection("estadisticas").doc("globales").onSnapshot(doc => { 
        if(doc.exists) { 
            document.getElementById('admVisitas').innerText = doc.data().visitas_totales || 0; 
        } 
    });
}

function cargarPagosManuales() {
    db.collection("pagos_pendientes").where("estado", "==", "pendiente").onSnapshot(snap => {
        let htmlTransf = ''; 
        let htmlBinance = '';
        
        if(snap.empty) { 
            htmlTransf = '<tr><td colspan="4" style="text-align:center; color:gray; padding: 20px;">No hay transferencias pendientes.</td></tr>'; 
            htmlBinance = '<tr><td colspan="4" style="text-align:center; color:gray; padding: 20px;">No hay pagos Binance pendientes.</td></tr>'; 
        } else {
            snap.forEach(doc => {
                const p = doc.data(); 
                
                let metodo = p.metodo || "";
                const esBinance = metodo.toLowerCase().includes("binance");
                
                let btnPDF = "";
                
                if (p.comprobante_url) {
                    btnPDF = `<button class="btn-action btn-pdf" style="margin-bottom:5px;" onclick="window.open('${p.comprobante_url}', '_blank')"><i class="fas fa-file-pdf"></i> VER PDF</button><br>`;
                } else {
                    btnPDF = `<span style="color:var(--danger); font-size:0.7rem;">Sin Comprobante</span><br>`;
                }
                
                let nombreJug = p.jugador_nombre || '';
                let uidRecortado = p.uid ? p.uid.substring(0,8) : '';
                
                let filaHtml = `
                <tr>
                    <td>
                        <b style="color:white; font-size:1rem;">${nombreJug.toUpperCase()}</b><br>
                        <span style="color:var(--text-gray); font-size:0.75rem;">UID: ${uidRecortado}</span>
                    </td>
                    <td>
                        <div style="color:var(--warning); font-weight:bold; font-size:1.1rem;">🪙 ${p.coins}</div>
                        <div style="font-size:0.8rem; color:#ccc;">$${p.usd} | ${p.metodo}</div>
                        <div style="font-family:monospace; font-size:0.75rem; color:var(--primary-neon);">ID: ${p.txid_o_nombre}</div>
                    </td>
                    <td style="text-align:center;">
                        ${btnPDF}
                    </td>
                    <td>
                        <button class="btn-action btn-unban" style="margin-bottom:5px; width:100%;" onclick="aprobarPagoManual('${doc.id}', '${p.uid}', ${p.coins})">
                            <i class="fas fa-check"></i> APROBAR
                        </button>
                        <button class="btn-action btn-ban" style="width:100%;" onclick="rechazarPagoManual('${doc.id}')">
                            <i class="fas fa-times"></i> RECHAZAR
                        </button>
                    </td>
                </tr>`;

                if(esBinance) {
                    htmlBinance += filaHtml;
                } else {
                    htmlTransf += filaHtml;
                }
            });
        }
        
        document.getElementById('tablaTransfAR').innerHTML = htmlTransf || '<tr><td colspan="4" style="text-align:center; color:gray; padding: 20px;">No hay transferencias pendientes.</td></tr>';
        document.getElementById('tablaBinance').innerHTML = htmlBinance || '<tr><td colspan="4" style="text-align:center; color:gray; padding: 20px;">No hay pagos Binance pendientes.</td></tr>';
    });
}

async function aprobarPagoManual(pagoId, uid, coins) {
    let confirmacion = await mostrarConfirm(
        "APROBAR PAGO", 
        "⚠️ ¿Audistaste el PDF y el dinero ingresó a la cuenta bancaria de LFA?<br><br>Se cargarán <b>🪙 " + coins + " Coins</b> al jugador."
    );
    
    if(!confirmacion) {
        return;
    }
    
    try {
        let batch = db.batch();
        
        // Sumamos las coins
        batch.update(db.collection("usuarios").doc(uid), { 
            number: firebase.firestore.FieldValue.increment(coins) 
        });
        
        // Cambiamos estado
        batch.update(db.collection("pagos_pendientes").doc(pagoId), { 
            estado: "aprobado", 
            fecha_aprobacion: firebase.firestore.FieldValue.serverTimestamp() 
        });
        
        await batch.commit();
        
        await mostrarAlerta(
            "APROBADO", 
            "¡Pago aprobado y monedas acreditadas al instante!", 
            "exito"
        );
        
    } catch(e) { 
        await mostrarAlerta(
            "ERROR", 
            "Error al procesar el pago en la base de datos.", 
            "error"
        ); 
    }
}

async function rechazarPagoManual(pagoId) { 
    let confirmacion = await mostrarConfirm(

    );

async function rechazarRetiro(docId, uidJugador, montoDevolver) {
    let motivo = prompt("El retiro será rechazado. ¿Cuál es el motivo? (Las monedas volverán a su billetera intactas):"); 
    
    if(motivo === null) {
        return;
    }
    
    if(motivo.trim() === "") {
        motivo = "Rechazado por el Staff (Revisá tus datos)";
    }
    
    try {
        let batch = db.batch();
        
        batch.update(db.collection("usuarios").doc(uidJugador), { 
            number: firebase.firestore.FieldValue.increment(montoDevolver) 
        });
        
        batch.update(db.collection("retiros").doc(docId), { 
            estado: "rechazado", 
            motivo_rechazo: motivo 
        });
        
        await batch.commit(); 
        
        await mostrarAlerta(
            "ÉXITO", 
            "Retiro cancelado. Los fondos fueron devueltos a la billetera del jugador.", 
            "exito"
        );
        
    } catch(e) { 
        await mostrarAlerta(
            "ERROR", 
            e.message, 
            "error"
        ); 
    }
}

async function crearTorneoEspecifico(tipo) {
    let titulo = "";
    let juego = "FC 26";
    let plataforma = "Crossplay";
    let formato = "";
    let cupos = 0;
    let costo = 0;
    let linkSala = "";
    let modoFinal = "";
    let detalles = "";

    // LECTURA DEL CUADRADO 1VS1
    if (tipo === '1vs1') {
        titulo = document.getElementById('tTitulo1v1').value.trim();
        detalles = document.getElementById('tDetalles1v1').value.trim();
        juego = document.getElementById('tJuego1v1').value;
        plataforma = document.getElementById('tPlat1v1').value;
        cupos = parseInt(document.getElementById('tCupos1v1').value);
        costo = parseFloat(document.getElementById('tCosto1v1').value) || 0;
        
        formato = "1vs1";
        modoFinal = document.getElementById('tModo1v1').value;
        linkSala = "/sala"; 
    } 
    // LECTURA DEL CUADRADO CO-OP & DRAFT
    else if (tipo === 'coop') {
        titulo = document.getElementById('tTituloCoop').value.trim();
        detalles = document.getElementById('tDetallesCoop').value.trim();
        juego = document.getElementById('tJuegoCoop').value;
        formato = document.getElementById('tFormatoCoop').value; 
        cupos = parseInt(document.getElementById('tCuposCoop').value);
        costo = parseFloat(document.getElementById('tCostoCoop').value) || 0;
        
        plataforma = "Crossplay (PS/Xbox/PC)"; 
        
        let modoElegido = document.getElementById('tModoCoop').value;
        if (formato === "2vs2_draft") {
            modoFinal = modoElegido + " | DRAFT 2VS2";
        } else {
            modoFinal = modoElegido + " | EQUIPOS 2VS2";
        }
        
        linkSala = "/salacoop"; 
    }
    // LECTURA DEL CUADRADO LIGAS
    else if (tipo === 'liga') {
        titulo = document.getElementById('tTituloLiga').value.trim();
        detalles = document.getElementById('tDetallesLiga').value.trim();
        juego = document.getElementById('tJuegoLiga').value;
        plataforma = document.getElementById('tPlatLiga').value;
        cupos = parseInt(document.getElementById('tCuposLiga').value);
        costo = parseFloat(document.getElementById('tCostoLiga').value) || 0;
        
        formato = "Liga";
        modoFinal = document.getElementById('tModoLiga').value + " | LIGA 1VS1";
        linkSala = "/liga"; 
    }
    // LECTURA DEL CUADRADO CLUBES PRO
    else if (tipo === 'clubes') {
        titulo = document.getElementById('tTituloClubes').value.trim();
        detalles = document.getElementById('tDetallesClubes').value.trim();
        juego = document.getElementById('tJuegoClubes').value;
        plataforma = document.getElementById('tPlatClubes').value;
        cupos = parseInt(document.getElementById('tCuposClubes').value);
        costo = parseFloat(document.getElementById('tCostoClubes').value) || 0;
        
        formato = "Clubes";
        modoFinal = document.getElementById('tModoClubes').value;
        linkSala = "/clubes"; 
    }

    if (!titulo || titulo === "") {
        await mostrarAlerta(
            "FALTAN DATOS", 
            "Tenés que ponerle un título al torneo antes de lanzarlo.", 
            "error"
        );
        return;
    }
    
    // Inyecta un hashtag random al título
    if(!titulo.includes('#')) {
        titulo += " #" + Math.floor(Math.random() * 9000 + 1000); 
    }
    
    if(!detalles || detalles === "") {
        detalles = "Premios LFA para el Campeón";
    }
    
    let estadoInicial = "abierto";
    if (formato === "2vs2_draft") {
        estadoInicial = "esperando_sorteo";
    }
    
    try {
        await db.collection("torneos").add({ 
            titulo: titulo, 
            detalles: detalles, 
            region: "GLOBAL", 
            juego: juego, 
            plataforma: plataforma, 
            modo: modoFinal, 
            formato: formato, 
            link_sala: linkSala, 
            cupos_totales: cupos, 
            costo_inscripcion: costo, 
            inscritos: 0, 
            participantes: [], 
            estado: estadoInicial, 
            creado: firebase.firestore.FieldValue.serverTimestamp(), 
            pozo_acumulado: 0 
        });
        
        await mostrarAlerta(
            "ÉXITO", 
            "¡Competición publicada con éxito en el servidor!", 
            "exito"
        ); 
        
        // Limpiamos los inputs
        if(tipo === '1vs1') document.getElementById('tTitulo1v1').value = '';
        if(tipo === 'coop') document.getElementById('tTituloCoop').value = '';
        if(tipo === 'liga') document.getElementById('tTituloLiga').value = '';
        if(tipo === 'clubes') document.getElementById('tTituloClubes').value = '';
        
    } catch (error) { 
        await mostrarAlerta(
            "ERROR", 
            "Error grave al crear el torneo: " + error.message, 
            "error"
        ); 
    }
}

function cargarTorneosAdmin() {
    // Query sin orderBy para evitar error de índice faltante, ordenamos en cliente
    db.collection("torneos").limit(100).onSnapshot(snap => {
        let html = '';
        
        if(snap.empty) { 
            html = '<tr><td colspan="4" style="text-align:center; color:gray; padding:20px;">No hay torneos en el servidor.</td></tr>'; 
        } else {
            // Ordenar por creado en cliente, más recientes primero
            const docs = [];
            snap.forEach(doc => docs.push(doc));
            docs.sort((a, b) => {
                const ta = a.data().creado?.toMillis?.() || 0;
                const tb = b.data().creado?.toMillis?.() || 0;
                return tb - ta;
            });
            
            docs.forEach(doc => {
                const t = doc.data(); 
                
                const yaRepartido = (t.estado === "finalizado_premios"); 
                
                let btnDraft = '';
                if(t.formato === "2vs2_draft" && t.estado === "esperando_sorteo") { 
                    btnDraft = `<button class="btn-action btn-draft" onclick="ejecutarSorteoDraft('${doc.id}')"><i class="fas fa-random"></i> SORTEO DRAFT</button>`; 
                }
                
                let inscriptos = 0;
                if (t.formato === "2vs2_draft" && t.estado === "esperando_sorteo") {
                    inscriptos = t.jugadores_individuales ? t.jugadores_individuales.length : 0;
                } else {
                    inscriptos = t.participantes ? t.participantes.length : 0;
                }
                
                let infoJugadores = inscriptos + "/" + t.cupos_totales;
                
                let tagEstado = '';
                if (t.estado === "en_juego") {
                    tagEstado = '<span style="color:var(--danger); font-weight:bold; margin-left:5px;">🔴 EN JUEGO</span>';
                }
                
                // El link predeterminado
                let rutaAcceso = "/sala";
                if (t.link_sala) {
                    rutaAcceso = t.link_sala;
                } else if ((t.formato || '').includes("2vs2") || (t.link_sala || '').includes("coop")) {
                    rutaAcceso = "/salacoop";
                }
                
                let btnEntrarSala = `<button class="btn-action" style="background:var(--primary-neon); color:black;" onclick="window.open('${rutaAcceso}?id=${doc.id}', '_blank')" title="Entrar a la Sala"><i class="fas fa-door-open"></i></button>`;
                
                html += `
                <tr>
                    <td>
                        <b style="color:white; font-size:1.05rem;">${t.titulo || '(Sin título)'}</b> ${tagEstado}<br>
                        <span style="color:var(--primary-neon); font-size:0.75rem;">${t.juego || '?'} | ${t.modo || t.formato || '?'}</span>
                    </td>
                    <td>
                        <span style="font-family:'Orbitron'; font-size:0.75rem; border: 1px solid gray; padding: 4px 8px; border-radius: 5px;">
                            ${(t.estado || 'desconocido').toUpperCase()}
                        </span>
                    </td>
                    <td>
                        <div style="font-size:0.8rem;"><i class="fas fa-users"></i> ${infoJugadores}</div>
                        <div style="color:var(--warning); font-weight:bold;">🪙 ${t.pozo_acumulado || 0}</div>
                    </td>
                    <td>
                        ${btnEntrarSala}
                        ${btnDraft}
                        <button class="btn-action btn-repartir" ${yaRepartido ? 'disabled style="background:#333;"' : ''} onclick="abrirModalPremios('${doc.id}', ${t.pozo_acumulado || 0})" title="Repartir Pozo">
                            <i class="fas fa-gift"></i>
                        </button> 
                        <button class="btn-action" style="background:#9146FF; color:white;" onclick="simularBots('${doc.id}', ${t.cupos_totales})" title="Llenar con BOTS">
                            <i class="fas fa-robot"></i>
                        </button>
                        <button class="btn-action" style="background:#00e5ff; color:black;" onclick="avanzarRondaSimulada('${doc.id}', ${t.cupos_totales})" title="Avanzar Ronda (BOTS)">
                            <i class="fas fa-forward"></i>
                        </button>
                        <button class="btn-action btn-ban" onclick="borrarTorneo('${doc.id}')" title="Eliminar">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>`;
            });  // fin docs.forEach
        }
        
        document.getElementById('listaTorneosAdmin').innerHTML = html;
    });
}

// =======================================================
// 🤖 SIMULADOR INTELIGENTE (ARREGLO DEL BUG DE ELIMINACIÓN)
// =======================================================
async function simularBots(tId, cuposEsperados) {
    let confirmar = await mostrarConfirm(
        "🤖 SIMULADOR LFA", 
        `¿Querés rellenar los huecos vacíos con BOTS virtuales?`
    );
    
    if(!confirmar) {
        return;
    }
    
    try {
        const doc = await db.collection("torneos").doc(tId).get(); 
        const d = doc.data();
        
        // 🚨 AQUÍ ESTABA EL ERROR. AHORA LEE CORRECTAMENTE DÓNDE ESTÁS VOS 🚨
        let campoAUsar = "participantes";
        if (d.formato === "2vs2_draft" && d.estado === "esperando_sorteo") {
            campoAUsar = "jugadores_individuales";
        }
        
        let partesActuales = d[campoAUsar] || []; 
        let faltantes = cuposEsperados - partesActuales.length;
        
        if (faltantes <= 0) {
            await mostrarAlerta(
                "LLENO", 
                "La sala ya tiene todos los cupos ocupados.", 
                "info"
            );
            return;
        }
        
        // CUIDAMOS A LOS HUMANOS: Copiamos el array existente
        let nuevosParticipantes = [...partesActuales];
        
        for(let i=0; i<faltantes; i++) { 
            nuevosParticipantes.push("BOT_" + Math.floor(Math.random() * 9000 + 1000)); 
        }
        
        // GUARDAMOS EN EL LUGAR CORRECTO
        if (d.formato === "2vs2_draft" && d.estado === "esperando_sorteo") {
            await db.collection("torneos").doc(tId).update({ 
                inscritos: cuposEsperados, 
                jugadores_individuales: nuevosParticipantes 
                // ❌ NO TOCAMOS PARTICIPANTES TODAVÍA PARA NO ELIMINAR A NADIE
            });
            
            await mostrarAlerta(
                "¡BOTS CARGADOS!", 
                "La sala se llenó de jugadores virtuales.\\n\\nAHORA TOCÁ EL BOTÓN VIOLETA 'SORTEO DRAFT' PARA ARMAR LAS PAREJAS Y GENERAR LOS BRACKETS.", 
                "exito"
            );
        } else {
            await db.collection("torneos").doc(tId).update({ 
                inscritos: cuposEsperados, 
                participantes: nuevosParticipantes, 
                estado: "en_juego", 
                jugadores_listos: nuevosParticipantes 
            });
            
            await mostrarAlerta(
                "¡TORNEO SIMULADO!", 
                "Se llenó con bots y el torneo ya arrancó en vivo.", 
                "exito"
            );
        }
    } catch(e) { 
        await mostrarAlerta(
            "ERROR", 
            "Falló la simulación: " + e.message, 
            "error"
        ); 
    }
}

// 🎲 ALGORITMO DRAFT MATEMÁTICO AVANZADO (CON BYES)
// =======================================================
async function ejecutarSorteoDraft(tid) {
    let confirmacion = await mostrarConfirm(
        "🎲 SORTEO DRAFT", 
        "Esto mezclará a los jugadores y armará los equipos en vivo. ¿Aceptar?"
    );
    
    if(!confirmacion) {
        return;
    }
    
    try {
        const doc = await db.collection("torneos").doc(tid).get(); 
        const t = doc.data();
        let ji = t.jugadores_individuales || []; 
        
        if(ji.length < 2) {
            await mostrarAlerta(
                "ERROR", 
                "Se necesitan mínimo 2 jugadores para armar 1 equipo.", 
                "error"
            );
            return;
        }
        
        let nombres = {};
        for(let uid of ji) { 
            if(uid.startsWith("BOT_")) { 
                nombres[uid] = "BOT " + uid.split("_")[1].substring(0,3); 
            } else { 
                try { 
                    let udoc = await db.collection("usuarios").doc(uid).get(); 
                    nombres[uid] = udoc.exists ? udoc.data().nombre : "JUGADOR"; 
                } catch(e) { 
                    nombres[uid] = "JUGADOR"; 
                } 
            } 
        }
        
        // Mezclamos (Shuffle)
        for (let i = ji.length - 1; i > 0; i--) { 
            const j = Math.floor(Math.random() * (i + 1)); 
            let temp = ji[i]; 
            ji[i] = ji[j]; 
            ji[j] = temp; 
        }
        
        let eDraft = {}; 
        let nE = 1; 
        let draftTeamsList = [];
        
        // Emparejamos de a 2
        for (let i = 0; i < ji.length; i += 2) {
            let u1 = ji[i]; 
            let u2 = ji[i+1] || ("BOT_" + Math.floor(Math.random() * 9000));
            
            let n1 = nombres[u1] || "JUGADOR"; 
            let n2 = nombres[u2] || ("BOT " + u2.split("_")[1].substring(0,3));
            
            let idF = "DRAFT_TEAM_" + nE; 
            
            eDraft[idF] = { 
                p1: u1, 
                p1_nombre: n1, 
                p2: u2, 
                p2_nombre: n2, 
                nombre: (n1.split(" ")[0] + " / " + n2.split(" ")[0]).toUpperCase() 
            };
            
            draftTeamsList.push(idF); 
            nE++;
        }
        
        let cantidadEquipos = draftTeamsList.length; 
        
        // 🚨 MATEMÁTICA DE BYES: EJ. SI SON 12 EQUIPOS, CALCULA 16 LUGARES Y METE 4 BYES
        let powerOf2 = Math.pow(2, Math.ceil(Math.log2(cantidadEquipos))); 
        let byesNeeded = powerOf2 - cantidadEquipos; 
        let normalMatches = (cantidadEquipos - byesNeeded) / 2; 

        let bTeams = []; 
        let teamIdx = 0;
        
        for(let i=0; i < powerOf2 / 2; i++) {
            if (i < normalMatches) { 
                bTeams.push(draftTeamsList[teamIdx++]); 
                bTeams.push(draftTeamsList[teamIdx++]); 
            } else { 
                bTeams.push(draftTeamsList[teamIdx++]); 
                bTeams.push("BYE"); 
            }
        }

        await db.collection("torneos").doc(tid).update({ 
            estado: "en_juego", 
            jugadores_individuales: ji, 
            participantes: bTeams, // AHORA LA DB GUARDA EL ARRAY PERFECTO CON "BYE"
            equipos_draft: eDraft, 
            cupos_totales: powerOf2 // AVISA AL FRONTEND EL TAMAÑO REAL DEL BRACKET
        });
        
        await mostrarAlerta(
            "ÉXITO", 
            "🎲 Parejas armadas y Torneo iniciado.\\nEl bracket ya está activo en la sala.", 
            "exito"
        );
        
    } catch(e) { 
        await mostrarAlerta("ERROR", e.message, "error"); 
    }
}

async function abrirModalPremios(id, pozo) {
    torneoPremiosId = id; 
    document.getElementById("infoPozo").innerText = `🪙 ${pozo} Coins`;
    
    const tDoc = await db.collection("torneos").doc(id).get(); 
    const parts = tDoc.data().participantes || [];
    
    if(parts.length === 0) {
        await mostrarAlerta("SIN JUGADORES", "No hay jugadores en esta sala.", "error");
        return;
    }
    
    let options = '<option value="">Elegir equipo ganador...</option>';
    
    for (const pid of parts) { 
        if (pid === "BYE") {
            continue;
        }
        
        if(pid.startsWith("BOT_")) { 
            options += `<option value="${pid}">BOT LFA</option>`; 
        } else if(pid.startsWith("DRAFT_")) { 
            options += `<option value="${pid}">${tDoc.data().equipos_draft[pid].nombre}</option>`; 
        } else { 
            const col = ((tDoc.data().formato||"").includes("2vs2")) ? "equipos_coop" : "usuarios"; 
            try { 
                const uDoc = await db.collection(col).doc(pid).get(); 
                options += `<option value="${pid}">${uDoc.exists ? uDoc.data().nombre : pid}</option>`; 
            } catch(e) { 
                options += `<option value="${pid}">${pid}</option>`; 
            } 
        }
    }
    
    document.getElementById("selectG1").innerHTML = options; 
    document.getElementById("modalPremios").style.display = "flex";
}

function cerrarModalPremios() { 
    document.getElementById("modalPremios").style.display = "none"; 
}

async function ejecutarReparto() {
    const g1 = document.getElementById("selectG1").value; 
    
    if(!g1 || g1 === "") {
        await mostrarAlerta("ERROR", "Tenés que elegir al campeón.", "error");
        return;
    }
    
    const btn = document.querySelector("#modalPremios .btn-main"); 
    const originalText = btn.innerHTML; 
    
    btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> PROCESANDO..."; 
    btn.disabled = true;
    
    try {
        const tDoc = await db.collection("torneos").doc(torneoPremiosId).get(); 
        const tData = tDoc.data(); 
        
        const esDraft = tData.formato === "2vs2_draft"; 
        const esCoop = (tData.formato || "").toLowerCase().includes("2vs2") || (tData.modo || "").toLowerCase().includes("2vs2"); 
        const pozo = tData.pozo_acumulado || 0;
        
        let batch = db.batch();
        
        if (esDraft && tData.equipos_draft) {
            const eq1 = tData.equipos_draft[g1];
            if (eq1) { 
                if(eq1.p1 && !eq1.p1.startsWith("BOT_")) {
                    batch.update(db.collection("usuarios").doc(eq1.p1), { 
                        copas: firebase.firestore.FieldValue.increment(1), 
                        number: firebase.firestore.FieldValue.increment(pozo / 2) 
                    });
                }
                if(eq1.p2 && !eq1.p2.startsWith("BOT_")) {
                    batch.update(db.collection("usuarios").doc(eq1.p2), { 
                        copas: firebase.firestore.FieldValue.increment(1), 
                        number: firebase.firestore.FieldValue.increment(pozo / 2) 
                    });
                }
            }
        } else if (esCoop) { 
            if(!g1.startsWith("BOT_")) {
                batch.update(db.collection("equipos_coop").doc(g1), { 
                    copas: firebase.firestore.FieldValue.increment(1), 
                    ganancias: firebase.firestore.FieldValue.increment(pozo) 
                }); 
            }
        } else { 
            if(!g1.startsWith("BOT_")) {
                batch.update(db.collection("usuarios").doc(g1), { 
                    copas: firebase.firestore.FieldValue.increment(1), 
                    number: firebase.firestore.FieldValue.increment(pozo) 
                }); 
            }
        }
        
        batch.update(db.collection("torneos").doc(torneoPremiosId), { 
            estado: "finalizado_premios", 
            ganador_final: g1 
        });
        
        await batch.commit(); 
        
        await mostrarAlerta(
            "PAGADO", 
            "¡Premios entregados! El Ranking Mundial ha sido actualizado a la fuerza.", 
            "exito"
        ); 
        
        cerrarModalPremios();
        
    } catch(e) { 
        await mostrarAlerta(
            "ERROR", 
            "Hubo un fallo: " + e.message, 
            "error"
        ); 
    }
    
    btn.innerHTML = originalText; 
    btn.disabled = false;
}

function cargarJugadores() {
    db.collection("usuarios").orderBy("nombre").onSnapshot(snap => {
        let html = ''; 
        let hashesVistos = {}; 
        dbJugadoresEnMemoria = []; 
        
        snap.forEach(doc => { 
            const u = doc.data(); 
            u.uid = doc.id; 
            dbJugadoresEnMemoria.push(u); 
            
            if(u.hw_avanzado && u.hw_avanzado.canvas_hash && u.hw_avanzado.canvas_hash !== "N/A") { 
                let hash = u.hw_avanzado.canvas_hash; 
                hashesVistos[hash] = (hashesVistos[hash] || 0) + 1; 
            } 
        });
        
        dbJugadoresEnMemoria.forEach(u => {
            let hw = u.hw_avanzado || {}; 
            let hash = hw.canvas_hash || 'N/A'; 
            let esClon = (hash !== 'N/A' && hashesVistos[hash] > 1);
            let clonWarning = '';
            
            if (esClon) {
                clonWarning = `<br><span style="color:var(--danger); font-weight:bold; font-size:0.75rem;"><i class="fas fa-exclamation-triangle"></i> MULTICUENTA</span>`;
            }
            
            let rowStyle = '';
            if (esClon) {
                rowStyle = 'border-left: 4px solid var(--danger); background: rgba(255, 71, 87, 0.05);';
            }
            
            // 🚨 BOTÓN DE DESBANEO EXPLICITO 🚨
            let btnBanHTML = '';
            if (u.baneado) {
                btnBanHTML = `<button class="btn-action btn-unban" onclick="desbanearJugador('${u.uid}', '${u.nombre}')" title="Desbanear Jugador"><i class="fas fa-unlock"></i> DESBANEAR</button>`;
            } else {
                btnBanHTML = `<button class="btn-action btn-ban" onclick="abrirModalBan('${u.uid}', '${u.nombre}')" title="Banear Jugador"><i class="fas fa-gavel"></i> BAN</button>`;
            }
            
            let htmlEstado = u.baneado ? '<span style="color:red; font-weight:bold;">BANEADO</span>' : '<span style="color:green; font-weight:bold;">ACTIVO</span>';
            
            html += `
            <tr class="fila-jugador" style="${rowStyle}">
                <td>
                    <b>${u.nombre || 'Sin nombre'}</b><br>
                    <span style="font-size:0.7rem; color:var(--primary-neon); cursor:pointer;" onclick="copiarUID('${u.uid}')">UID: ${u.uid.substring(0,8)}...</span>
                </td>
                <td>
                    ${u.email}<br>
                    <span style="font-size:0.7rem; color:gray;">IP: ${u.ip_conexion || 'Oculta'}</span>
                </td>
                <td>
                    <div style="font-size:0.75rem;">
                        🌍 ${u.pais_codigo || 'XX'}<br>
                        💻 <span style="color:var(--warning); font-family:monospace;">${hash.substring(0,10)}...</span>
                        ${clonWarning}
                    </div>
                </td>
                <td>
                    <b style="color:var(--warning);">🪙 ${(u.number || 0).toFixed(2)}</b>
                </td>
                <td>
                    ${htmlEstado}
                </td>
                <td>
                    <button class="btn-action btn-globe" onclick="abrirModoDetective('${u.uid}')"><i class="fas fa-search"></i></button> 
                    ${btnBanHTML} 
                    <button class="btn-action btn-coins" onclick="abrirModalCoins('${u.uid}', '${u.nombre}', ${u.number || 0})"><i class="fas fa-coins"></i></button>
                </td>
            </tr>`;
        }); 
        
        document.getElementById('listaJugadores').innerHTML = html;
    });
}

async function abrirModoDetective(uidBuscado) {
    const jugador = dbJugadoresEnMemoria.find(j => j.uid === uidBuscado); 
    
    if(!jugador) {
        await mostrarAlerta("ERROR", "Jugador no encontrado en memoria.", "error");
        return;
    }
    
    const hw = jugador.hw_avanzado || {}; 
    const hashPrincipal = hw.canvas_hash || 'N/A'; 
    const ipPrincipal = jugador.ip_conexion || 'N/A';
    
    document.getElementById('detNombre').innerText = (jugador.nombre || 'Sin Nombre').toUpperCase(); 
    document.getElementById('detEmail').innerText = jugador.email; 
    document.getElementById('detPlataforma').innerText = jugador.plataforma_id || 'No registrada'; 
    document.getElementById('detIP').innerText = ipPrincipal; 
    document.getElementById('detHash').innerText = hashPrincipal; 
    document.getElementById('detSistema').innerText = hw.ua ? hw.ua.substring(0, 50) + "..." : 'Desconocido';
    
    const clones = dbJugadoresEnMemoria.filter(j => { 
        if (j.uid === uidBuscado) {
            return false;
        }
        
        const jHw = j.hw_avanzado || {}; 
        const jHash = jHw.canvas_hash || 'N/A_X'; 
        const jIp = j.ip_conexion || 'N/A_Y'; 
        
        return (jHash !== 'N/A' && jHash === hashPrincipal) || (jIp !== 'Oculta' && jIp === ipPrincipal); 
    });
    
    let htmlClones = '';
    
    if (clones.length === 0) { 
        htmlClones = '<div style="color:var(--primary-neon); text-align:center; font-weight:bold;"><i class="fas fa-check-circle"></i> CUENTA LIMPIA.</div>'; 
    } else { 
        htmlClones = `<div style="color:var(--danger); font-weight:bold; margin-bottom: 10px;"><i class="fas fa-exclamation-triangle"></i> ¡ATENCIÓN! Se detectaron ${clones.length} cuentas vinculadas:</div>`; 
        
        clones.forEach(c => { 
            const motivo = (c.hw_avanzado && c.hw_avanzado.canvas_hash === hashPrincipal) ? 'Mismo Celular/PC' : 'Mismo Wi-Fi (IP)'; 
            htmlClones += `
            <div style="background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; margin-bottom: 5px; display:flex; justify-content:space-between; align-items:center; border-left: 3px solid var(--danger);">
                <div>
                    <b style="color:white;">${c.nombre}</b> <span style="color:gray; font-size:0.8rem;">(${c.email})</span><br>
                    <span style="color:var(--danger); font-size:0.75rem; font-weight:bold;">MOTIVO: ${motivo}</span>
                </div>
                <button class="btn-action btn-ban" onclick="abrirModalBan('${c.uid}', '${c.nombre}')"><i class="fas fa-gavel"></i> BAN</button>
            </div>`; 
        }); 
    }
    
    document.getElementById('detClones').innerHTML = htmlClones; 
    document.getElementById('modalDetective').style.display = 'flex';
}

async function ejecutarBan() { 
    const val = document.getElementById('mBanTiempo').value; 
    let dias = parseInt(val); 
    
    let dataUpdate = { 
        baneado: true 
    }; 
    
    if (dias > 0) { 
        let f = new Date(); 
        f.setDate(f.getDate() + dias); 
        
        dataUpdate.ban_hasta = firebase.firestore.Timestamp.fromDate(f); 
        dataUpdate.dias_ban = dias; 
    } else { 
        dataUpdate.dias_ban = 0; 
    } 
    
    await db.collection("usuarios").doc(uidEdicionActual).update(dataUpdate); 
    await mostrarAlerta("SANCIONADO", "Jugador BANEADO.", "exito"); 
    
    cerrarModalBan(); 
}

async function cambiarFairPlay(nuevoPuntaje) { 
    const jugadorUid = document.getElementById("fpJugadorUid").value.trim(); 
    
    if(!jugadorUid) {
        await mostrarAlerta("FALTAN DATOS", "Pegá el UID del jugador primero en la caja de texto.", "error");
        return;
    }
    
    let confirmacion = await mostrarConfirm(
        "MODIFICAR FAIR PLAY", 
        "Seguro que querés cambiar el Trust Factor de este usuario a <b>" + nuevoPuntaje + "%</b>?"
    );
    
    if(confirmacion) { 
        try { 
            const token = await auth.currentUser.getIdToken(); 
            const res = await fetch("https://us-central1-lfaofficial.cloudfunctions.net/modificarFairPlay", { 
                method: "POST", 
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": `Bearer ${token}` 
                }, 
                body: JSON.stringify({ 
                    jugadorUid: jugadorUid, 
                    nuevoPuntaje: nuevoPuntaje 
                }) 
            }); 
            
            const data = await res.json(); 
            
            if(data.success) { 
                await mostrarAlerta("ÉXITO", data.mensaje, "exito"); 
                document.getElementById("fpJugadorUid").value = ""; 
            } else { 
                await mostrarAlerta("ERROR", data.error || "Desconocido", "error"); 
            } 
        } catch (e) { 
            await mostrarAlerta("ERROR", "Error de conexión con el servidor de la función LFA.", "error"); 
        } 
    } 
}

// ⏭️ AVANZAR RONDA BOTS (RECONOCE BYES Y AUTO-AVANZA DE VERDAD)
// =======================================================
async function avanzarRondaSimulada(torneoId, cupos) {
    let confirmacion = await mostrarConfirm(
        "⏭️ AVANZAR RONDA", 
        "¿Simular resultados al azar y avanzar a los ganadores a la siguiente llave?"
    );
    
    if(!confirmacion) {
        return;
    }
    
    try {
        const doc = await db.collection("torneos").doc(torneoId).get(); 
        const d = doc.data(); 
        
        let rondaActual = 1;
        let totalRondas = Math.ceil(Math.log2(cupos)); 
        
        if(totalRondas < 2) {
            totalRondas = 2;
        }
        
        // Detectamos en qué ronda está parado el torneo
        if (!d.llaves_ronda2 || d.llaves_ronda2.length === 0) {
            rondaActual = 1; 
        } else if (!d.llaves_ronda3 || d.llaves_ronda3.length === 0) {
            rondaActual = 2; 
        } else if (!d.llaves_ronda4 || d.llaves_ronda4.length === 0) {
            rondaActual = 3; 
        } else if (!d.llaves_ronda5 || d.llaves_ronda5.length === 0) {
            rondaActual = 4; 
        } else if (!d.llaves_ronda6 || d.llaves_ronda6.length === 0) {
            rondaActual = 5;
        } else {
            rondaActual = 6;
        }
        
        let jugadoresActuales = [];
        if (rondaActual === 1) {
            jugadoresActuales = d.participantes;
        } else {
            jugadoresActuales = d['llaves_ronda'+rondaActual];
        }
        
        if (!jugadoresActuales || jugadoresActuales.length <= 1) {
            await mostrarAlerta("FIN", "Este torneo ya llegó a su fin. No se puede avanzar más.", "info");
            return;
        }
        
        let ganadores = []; 
        let perdedores = []; 
        
        for(let i=0; i < jugadoresActuales.length; i += 2) { 
            let p1 = jugadoresActuales[i]; 
            let p2 = jugadoresActuales[i+1]; 
            
            // 🚨 SI NADIE ES "BYE", TIRAMOS LA MONEDA PARA VER QUIÉN GANA
            if(p1 && p2 && p1 !== "BYE" && p2 !== "BYE") { 
                let win = Math.random() > 0.5 ? p1 : p2; 
                let lose = win === p1 ? p2 : p1; 
                ganadores.push(win); 
                perdedores.push(lose); 
            } 
            // 🚨 SI EL RIVAL ES UN PASE LIBRE (BYE), EL JUGADOR AVANZA DIRECTO AL 100%
            else if (p1 && p1 !== "BYE") { 
                ganadores.push(p1); 
            } 
            else if (p2 && p2 !== "BYE") { 
                ganadores.push(p2); 
            } 
            else { 
                ganadores.push("BYE"); 
            } 
        }
        
        let updateData = {};
        
        if (rondaActual === totalRondas - 1) {
            updateData['llaves_ronda' + (rondaActual + 1)] = ganadores; 
            updateData.llave_tercer_puesto = perdedores; 
        } else if (rondaActual === totalRondas) { 
            updateData.ganador_final = ganadores[0]; 
            
            if(d.llave_tercer_puesto && d.llave_tercer_puesto.length === 2) {
                updateData.ganador_tercer_puesto = Math.random() > 0.5 ? d.llave_tercer_puesto[0] : d.llave_tercer_puesto[1];
            }
            updateData.estado = "finalizado"; 
        } else { 
            updateData['llaves_ronda' + (rondaActual + 1)] = ganadores; 
        }
        
        await db.collection("torneos").doc(torneoId).update(updateData);
        
        await mostrarAlerta("RONDA AVANZADA", "Se simularon los resultados matemáticos. Revisá las llaves actualizadas en la Sala del torneo.", "exito");
        
    } catch(e) { 
        await mostrarAlerta("ERROR", "Hubo un error al avanzar de ronda: " + e.message, "error"); 
    }
}
